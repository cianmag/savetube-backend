services:
  - type: web
    name: yt-resolver-api
    runtime: python
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: >
      gunicorn app:app
      --workers 2
      --timeout 120
      --bind 0.0.0.0:$PORT
      --log-level info
      --access-logfile -
      --error-logfile -
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: YT_PO_TOKEN
        sync: false
      - key: REDIS_URL
        sync: false

  - type: redis
    name: yt-resolver-redis
    plan: free
    ipAllowList: []
